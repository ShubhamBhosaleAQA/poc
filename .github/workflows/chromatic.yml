name: Chromatic

on:
  pull_request:
    branches: [main]
    paths:
      - storybook-poc/**
      - .github/workflows/chromatic.yml

jobs:
  chromatic:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: storybook-poc
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: storybook-poc/package-lock.json
      - run: npm ci
      - run: npx chromatic --project-token=${{ secrets.CHROMATIC_PROJECT_TOKEN }}